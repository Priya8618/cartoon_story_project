<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Story Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f8ff; font-family: 'Comic Sans MS', cursive, sans-serif; }
        .card { border: 5px solid #ffce00; border-radius: 20px; }
        #loading-screen { display: none; }
    </style>
</head>
<body>

<div class="container mt-5 text-center" id="main-content">
    <h1 class="display-4 text-primary fw-bold mb-4">✨ My Magic Story Maker ✨</h1>
    
    <div class="row justify-content-center">
        <div class="col-md-6 card shadow-lg p-4 bg-white">
            <form action="{% url 'generate_story' %}" method="POST" enctype="multipart/form-data" onsubmit="showLoading()">
                {% csrf_token %}
                
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Hero's Name:</label>
                    <input type="text" name="character_name" placeholder="E.g. Rahul, Sarah..." class="form-control form-control-lg" required>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Upload a clear photo of a face:</label>
                    <input type="file" name="original_photo" accept="image/*" class="form-control form-control-lg" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">Choose Story Language:</label>
                    <select name="language" class="form-select form-select-lg">
                        <option value="en">English</option>
                        <option value="hi">Hindi</option>
                        <option value="kn">Kannada</option>
                        <option value="ta">Tamil</option>
                        <option value="te">Telugu</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success btn-lg w-100 fs-3">🚀 Create My Book!</button>
            </form>
        </div>
    </div>
</div>

<div class="container mt-5 text-center" id="loading-screen">
    <h2 class="text-primary">🪄 Writing the story, drawing the pictures, and recording the voice...</h2>
    <h4 class="text-muted">This takes about 1-2 minutes. Please don't refresh the page!</h4>
    <div class="spinner-border text-warning mt-4" style="width: 4rem; height: 4rem;" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<script>
    function showLoading() {
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';
    }
</script>

</body>
</html>
